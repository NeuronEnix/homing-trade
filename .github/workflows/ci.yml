name: CI

# Run the full test suite on every PR and on pushes to main, so a red suite is visible before
# merge. Make this a REQUIRED status check in branch protection to actually block merge on red
# (Settings → Branches → main → Require status checks → "tests").
on:
  pull_request:
  push:
    branches: [main]

# Cancel an in-progress run when a branch is pushed again, so only the latest commit is tested.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run the test suite
        run: python -m pytest -q
